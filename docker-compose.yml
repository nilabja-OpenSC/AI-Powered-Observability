version: '3.8'

services:
  # =============================================================================
  # Database Layer
  # =============================================================================
  
  postgresql:
    image: postgres:15-alpine
    container_name: postgresql
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observability-net

  # =============================================================================
  # Observability Stack
  # =============================================================================
  
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - observability-net

  grafana:
    image: grafana/grafana:10.0.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    depends_on:
      - prometheus
      - loki
    networks:
      - observability-net

  loki:
    image: grafana/loki:2.8.0
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    networks:
      - observability-net

  promtail:
    image: grafana/promtail:2.8.0
    container_name: promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./config/promtail.yml:/etc/promtail/config.yml
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki
    networks:
      - observability-net

  # =============================================================================
  # AI Agents
  # =============================================================================
  
  supervisor-agent:
    build:
      context: ./src/agents
      dockerfile: Dockerfile.supervisor
    container_name: supervisor-agent
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - KUBERNETES_NAMESPACE=nilabja-haldar-dev
      - PROMETHEUS_URL=http://prometheus:9090
      - LOKI_URL=http://loki:3100
      - GRAFANA_URL=http://grafana:3000
    ports:
      - "8080:8080"
    volumes:
      - ./src/agents:/app
      - chroma_data:/app/chroma_data
    depends_on:
      - prometheus
      - loki
      - grafana
    networks:
      - observability-net

  observability-agent:
    build:
      context: ./src/agents
      dockerfile: Dockerfile.observability
    container_name: observability-agent
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - PROMETHEUS_URL=http://prometheus:9090
      - LOKI_URL=http://loki:3100
      - GRAFANA_URL=http://grafana:3000
    ports:
      - "8081:8081"
    volumes:
      - ./src/agents:/app
    depends_on:
      - prometheus
      - loki
      - grafana
    networks:
      - observability-net

  pod-recovery-agent:
    build:
      context: ./src/agents
      dockerfile: Dockerfile.pod-recovery
    container_name: pod-recovery-agent
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - KUBERNETES_NAMESPACE=nilabja-haldar-dev
    ports:
      - "8082:8082"
    volumes:
      - ./src/agents:/app
      - ~/.kube:/root/.kube:ro
    networks:
      - observability-net

  backup-restore-agent:
    build:
      context: ./src/agents
      dockerfile: Dockerfile.backup-restore
    container_name: backup-restore-agent
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - KUBERNETES_NAMESPACE=nilabja-haldar-dev
    ports:
      - "8083:8083"
    volumes:
      - ./src/agents:/app
      - ~/.kube:/root/.kube:ro
    networks:
      - observability-net

  # =============================================================================
  # E-commerce Application
  # =============================================================================
  
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgresql:5432/ecommerce
      - CORS_ORIGINS=["http://localhost:3001","http://frontend:3001"]
    ports:
      - "8000:8000"
    volumes:
      - ./src/backend:/app
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - observability-net

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3001:3000"
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - observability-net

  chat-ui:
    build:
      context: ./src/chat-ui
      dockerfile: Dockerfile
    container_name: chat-ui
    environment:
      - VITE_SUPERVISOR_URL=http://localhost:8080
      - VITE_WS_URL=ws://localhost:8080/ws
    ports:
      - "5173:5173"
    volumes:
      - ./src/chat-ui:/app
      - /app/node_modules
    depends_on:
      - supervisor-agent
    networks:
      - observability-net

# =============================================================================
# Volumes
# =============================================================================

volumes:
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  chroma_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================

networks:
  observability-net:
    driver: bridge

