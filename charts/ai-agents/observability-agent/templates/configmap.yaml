apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "observability-agent.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "observability-agent.labels" . | nindent 4 }}
data:
  LLM_PROVIDER: {{ .Values.llm.provider | quote }}
  PROMETHEUS_URL: {{ .Values.prometheus.url | quote }}
  LOKI_URL: {{ .Values.loki.url | quote }}
  GRAFANA_URL: {{ .Values.grafana.url | quote }}

