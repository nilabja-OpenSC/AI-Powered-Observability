apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "backup-restore-agent.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "backup-restore-agent.labels" . | nindent 4 }}
data:
  NAMESPACE: {{ .Values.namespace | quote }}
  VELERO_NAMESPACE: {{ .Values.config.veleroNamespace | quote }}
  ARGO_WORKFLOWS_NAMESPACE: {{ .Values.config.argoWorkflowsNamespace | quote }}
  LLM_PROVIDER: {{ .Values.config.llmProvider | quote }}
  LLM_MODEL: {{ .Values.config.llmModel | quote }}
  SUPERVISOR_URL: {{ .Values.config.supervisorUrl | quote }}

