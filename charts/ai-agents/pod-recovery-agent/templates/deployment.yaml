apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pod-recovery-agent.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "pod-recovery-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "pod-recovery-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "pod-recovery-agent.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "pod-recovery-agent.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.port }}
          protocol: TCP
        env:
        - name: NAMESPACE
          valueFrom:
            configMapKeyRef:
              name: {{ include "pod-recovery-agent.fullname" . }}
              key: NAMESPACE
        - name: PROMETHEUS_URL
          valueFrom:
            configMapKeyRef:
              name: {{ include "pod-recovery-agent.fullname" . }}
              key: PROMETHEUS_URL
        - name: SLACK_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: {{ .Values.secrets.name }}
              key: SLACK_WEBHOOK_URL
        - name: SLACK_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.secrets.name }}
              key: SLACK_BOT_TOKEN
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.secrets.name }}
              key: OPENAI_API_KEY
        - name: LLM_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: {{ include "pod-recovery-agent.fullname" . }}
              key: LLM_PROVIDER
        - name: LLM_MODEL
          valueFrom:
            configMapKeyRef:
              name: {{ include "pod-recovery-agent.fullname" . }}
              key: LLM_MODEL
        - name: SUPERVISOR_URL
          valueFrom:
            configMapKeyRef:
              name: {{ include "pod-recovery-agent.fullname" . }}
              key: SUPERVISOR_URL
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        volumeMounts:
        - name: agent-memory
          mountPath: /app/memory
      volumes:
      - name: agent-memory
        persistentVolumeClaim:
          claimName: {{ include "pod-recovery-agent.fullname" . }}-pvc
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

