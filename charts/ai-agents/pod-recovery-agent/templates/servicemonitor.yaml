{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "pod-recovery-agent.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "pod-recovery-agent.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "pod-recovery-agent.selectorLabels" . | nindent 6 }}
  endpoints:
  - port: http
    path: /metrics
    interval: {{ .Values.serviceMonitor.interval }}
    scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
{{- end }}

