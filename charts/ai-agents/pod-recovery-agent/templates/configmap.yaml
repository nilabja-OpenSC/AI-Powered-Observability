apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pod-recovery-agent.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "pod-recovery-agent.labels" . | nindent 4 }}
data:
  NAMESPACE: {{ .Values.namespace | quote }}
  PROMETHEUS_URL: {{ .Values.config.prometheusUrl | quote }}
  LLM_PROVIDER: {{ .Values.config.llmProvider | quote }}
  LLM_MODEL: {{ .Values.config.llmModel | quote }}
  SUPERVISOR_URL: {{ .Values.config.supervisorUrl | quote }}

