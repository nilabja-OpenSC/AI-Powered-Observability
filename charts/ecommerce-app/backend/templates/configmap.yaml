apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "backend.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
data:
  CORS_ORIGINS: {{ .Values.env.CORS_ORIGINS | quote }}
  LOG_LEVEL: {{ .Values.env.LOG_LEVEL }}
  ENVIRONMENT: {{ .Values.env.ENVIRONMENT }}

