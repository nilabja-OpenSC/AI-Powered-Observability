apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "velero.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "velero.labels" . | nindent 4 }}
data:
  backup-location.yaml: |
    apiVersion: velero.io/v1
    kind: BackupStorageLocation
    metadata:
      name: default
      namespace: {{ .Values.namespace }}
    spec:
      provider: {{ .Values.config.provider }}
      objectStorage:
        bucket: {{ .Values.config.bucket }}
        prefix: {{ .Values.config.prefix }}
      config:
        region: {{ .Values.config.region }}
        s3ForcePathStyle: "true"
        s3Url: {{ .Values.config.s3Url }}
  
  volume-snapshot-location.yaml: |
    apiVersion: velero.io/v1
    kind: VolumeSnapshotLocation
    metadata:
      name: default
      namespace: {{ .Values.namespace }}
    spec:
      provider: {{ .Values.config.provider }}
      config:
        region: {{ .Values.config.region }}
  
  schedule.yaml: |
    apiVersion: velero.io/v1
    kind: Schedule
    metadata:
      name: daily-backup
      namespace: {{ .Values.namespace }}
    spec:
      schedule: {{ .Values.config.backupSchedule }}
      template:
        includedNamespaces:
        - {{ .Values.namespace }}
        storageLocation: default
        volumeSnapshotLocations:
        - default
        ttl: {{ .Values.config.backupTTL }}

