apiVersion: v1
kind: Service
metadata:
  name: {{ include "velero.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "velero.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  - port: 8086
    targetPort: metrics
    protocol: TCP
    name: metrics
  selector:
    {{- include "velero.selectorLabels" . | nindent 4 }}

