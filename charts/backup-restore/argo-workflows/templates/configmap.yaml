apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "argo-workflows.fullname" . }}-workflow-controller-configmap
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "argo-workflows.labels" . | nindent 4 }}
data:
  config: |
    namespace: {{ .Values.namespace }}
    
    # Executor configuration
    executor:
      imagePullPolicy: {{ .Values.image.pullPolicy }}
    
    # Artifact repository configuration
    artifactRepository:
      s3:
        bucket: {{ .Values.config.artifactBucket }}
        endpoint: {{ .Values.config.s3Endpoint }}
        insecure: false
        accessKeySecret:
          name: {{ .Values.secrets.name }}
          key: accesskey
        secretKeySecret:
          name: {{ .Values.secrets.name }}
          key: secretkey
    
    # Workflow defaults
    workflowDefaults:
      spec:
        ttlStrategy:
          secondsAfterCompletion: {{ .Values.config.workflowTTL }}
        podGC:
          strategy: OnWorkflowCompletion
    
    # Metrics configuration
    metricsConfig:
      enabled: true
      path: /metrics
      port: 9090
    
    # Telemetry configuration
    telemetryConfig:
      enabled: false

