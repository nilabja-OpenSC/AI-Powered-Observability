apiVersion: v1
kind: Secret
metadata:
  name: {{ include "postgresql.fullname" . }}-secret
  namespace: nilabja-haldar-dev
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
type: Opaque
data:
  # Default password (base64 encoded "postgres123")
  # IMPORTANT: Change this in production!
  postgres-password: {{ "postgres123" | b64enc | quote }}

