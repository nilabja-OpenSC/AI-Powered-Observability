# PostgreSQL Helm Chart Values
# Namespace: nilabja-haldar-dev

replicaCount: 1

image:
  repository: postgres
  tag: "15.0"
  pullPolicy: IfNotPresent

# Database configuration
postgresql:
  database: ecommerce
  username: postgres
  # Password will be set via secret
  port: 5432

# Storage configuration (EFS CSI)
persistence:
  enabled: true
  storageClass: efs-sc
  accessMode: ReadWriteOnce
  size: 10Gi
  mountPath: /var/lib/postgresql/data

# Resource limits (not set per requirements)
resources: {}
  # limits:
  #   cpu: 1000m
  #   memory: 2Gi
  # requests:
  #   cpu: 500m
  #   memory: 1Gi

# Service configuration
service:
  type: ClusterIP
  port: 5432

# Observability
metrics:
  enabled: true
  image:
    repository: prometheuscommunity/postgres-exporter
    tag: v0.11.1
  port: 9187

# Backup configuration
backup:
  enabled: true
  schedule: "0 2 * * *"  # Daily at 2 AM

# Security
securityContext:
  runAsUser: 999
  runAsGroup: 999
  fsGroup: 999

# Liveness and readiness probes
livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

readinessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

# Init container for database initialization
initdb:
  enabled: true
  scripts:
    init.sql: |
      -- Create tables for e-commerce application
      CREATE TABLE IF NOT EXISTS users (
        id SERIAL PRIMARY KEY,
        name VARCHAR(255) NOT NULL,
        email VARCHAR(255) UNIQUE NOT NULL,
        is_admin BOOLEAN DEFAULT FALSE,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
      );

      CREATE TABLE IF NOT EXISTS products (
        id SERIAL PRIMARY KEY,
        name VARCHAR(255) NOT NULL,
        description TEXT,
        price DECIMAL(10, 2) NOT NULL,
        stock INTEGER NOT NULL DEFAULT 0,
        category VARCHAR(100),
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
      );

      CREATE TABLE IF NOT EXISTS carts (
        id SERIAL PRIMARY KEY,
        user_id INTEGER REFERENCES users(id) ON DELETE CASCADE,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
      );

      CREATE TABLE IF NOT EXISTS cart_items (
        id SERIAL PRIMARY KEY,
        cart_id INTEGER REFERENCES carts(id) ON DELETE CASCADE,
        product_id INTEGER REFERENCES products(id) ON DELETE CASCADE,
        quantity INTEGER NOT NULL DEFAULT 1,
        added_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        UNIQUE(cart_id, product_id)
      );

      -- Create indexes for performance
      CREATE INDEX idx_users_email ON users(email);
      CREATE INDEX idx_products_category ON products(category);
      CREATE INDEX idx_carts_user_id ON carts(user_id);
      CREATE INDEX idx_cart_items_cart_id ON cart_items(cart_id);
      CREATE INDEX idx_cart_items_product_id ON cart_items(product_id);

# Made with Bob
