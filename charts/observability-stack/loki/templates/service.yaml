apiVersion: v1
kind: Service
metadata:
  name: {{ include "loki.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "loki.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  - port: 9095
    targetPort: grpc
    protocol: TCP
    name: grpc
  selector:
    {{- include "loki.selectorLabels" . | nindent 4 }}

