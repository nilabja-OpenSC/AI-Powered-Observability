# Promtail Helm Chart Values
# Namespace: nilabja-haldar-dev

image:
  repository: grafana/promtail
  tag: "2.8.0"
  pullPolicy: IfNotPresent

# Deploy as DaemonSet to collect logs from all nodes
daemonset:
  enabled: true

# Promtail configuration
config:
  serverPort: 3101
  
  # Loki client configuration
  clients:
    - url: http://loki:3100/loki/api/v1/push
      tenant_id: ""
      batchwait: 1s
      batchsize: 1048576
      timeout: 10s
  
  # Positions file
  positions:
    filename: /run/promtail/positions.yaml
  
  # Scrape configurations
  scrape_configs:
    # Kubernetes pod logs
    - job_name: kubernetes-pods
      kubernetes_sd_configs:
        - role: pod
          namespaces:
            names:
              - nilabja-haldar-dev
      
      pipeline_stages:
        # Extract log level
        - regex:
            expression: '(?P<level>DEBUG|INFO|WARN|ERROR|FATAL)'
        - labels:
            level:
        
        # Parse JSON logs
        - json:
            expressions:
              timestamp: timestamp
              message: message
              app: app
              pod: pod
              namespace: namespace
        
        # Add timestamp
        - timestamp:
            source: timestamp
            format: RFC3339
        
        # Add labels
        - labels:
            app:
            pod:
            namespace:
      
      relabel_configs:
        # Only scrape pods in nilabja-haldar-dev namespace
        - source_labels: [__meta_kubernetes_namespace]
          action: keep
          regex: nilabja-haldar-dev
        
        # Add namespace label
        - source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        
        # Add pod name label
        - source_labels: [__meta_kubernetes_pod_name]
          target_label: pod
        
        # Add container name label
        - source_labels: [__meta_kubernetes_pod_container_name]
          target_label: container
        
        # Add app label
        - source_labels: [__meta_kubernetes_pod_label_app]
          target_label: app
        
        # Add node name label
        - source_labels: [__meta_kubernetes_pod_node_name]
          target_label: node
        
        # Set log path
        - source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
          target_label: __path__
          separator: /
          replacement: /var/log/pods/*$1/*.log

# Service configuration
service:
  enabled: true
  type: ClusterIP
  port: 3101

# Resource limits (not set per requirements)
resources: {}
  # limits:
  #   cpu: 200m
  #   memory: 256Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# Security context
securityContext:
  runAsUser: 0  # Required to read pod logs
  runAsGroup: 0
  privileged: true
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Volume mounts for log collection
volumeMounts:
  - name: pods
    mountPath: /var/log/pods
    readOnly: true
  - name: containers
    mountPath: /var/lib/docker/containers
    readOnly: true
  - name: run
    mountPath: /run/promtail

volumes:
  - name: pods
    hostPath:
      path: /var/log/pods
  - name: containers
    hostPath:
      path: /var/lib/docker/containers
  - name: run
    emptyDir: {}

# Tolerations to run on all nodes
tolerations:
  - effect: NoSchedule
    operator: Exists

# ServiceMonitor for Prometheus
serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /ready
    port: 3101
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 1
  failureThreshold: 5

readinessProbe:
  httpGet:
    path: /ready
    port: 3101
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 1
  failureThreshold: 5

