apiVersion: v1
kind: Service
metadata:
  name: {{ include "alertmanager.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "alertmanager.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  - port: 9094
    targetPort: cluster
    protocol: TCP
    name: cluster
  selector:
    {{- include "alertmanager.selectorLabels" . | nindent 4 }}

