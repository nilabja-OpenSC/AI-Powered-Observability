# Alertmanager Configuration for AI-Powered Observability Platform
# Namespace: nilabja-haldar-dev
# Purpose: Alert routing and notification management with Slack integration

# Global settings
global:
  namespace: nilabja-haldar-dev
  storageClass: efs-sc  # EFS CSI storage class

# Alertmanager deployment
replicaCount: 2  # High availability

image:
  repository: quay.io/prometheus/alertmanager
  tag: v0.27.0
  pullPolicy: IfNotPresent

# Service configuration
service:
  type: ClusterIP
  port: 9093
  clusterPort: 9094  # For cluster communication

# Persistent storage for alert state
persistence:
  enabled: true
  storageClass: efs-sc
  accessMode: ReadWriteOnce
  size: 5Gi

# Alertmanager configuration
config:
  global:
    # Slack API URL (set via secret)
    slack_api_url: ""  # Will be set from secret
    
    # Default notification settings
    resolve_timeout: 5m
    
  # Route configuration
  route:
    # Default receiver
    receiver: 'slack-observability-alerts'
    
    # Group alerts by these labels
    group_by: ['alertname', 'namespace', 'severity']
    
    # Wait time before sending initial notification
    group_wait: 30s
    
    # Wait time before sending notification about new alerts in group
    group_interval: 5m
    
    # Wait time before re-sending notification
    repeat_interval: 4h
    
    # Child routes for specific alert types
    routes:
      # Critical alerts - immediate notification
      - match:
          severity: critical
        receiver: 'slack-critical-alerts'
        group_wait: 10s
        repeat_interval: 1h
      
      # High severity alerts
      - match:
          severity: high
        receiver: 'slack-high-alerts'
        group_wait: 30s
        repeat_interval: 2h
      
      # Pod health alerts
      - match:
          alertname: PodCrashLooping
        receiver: 'slack-pod-alerts'
        group_wait: 1m
        repeat_interval: 30m
      
      - match:
          alertname: PodNotReady
        receiver: 'slack-pod-alerts'
        group_wait: 2m
        repeat_interval: 1h
      
      # Database alerts
      - match_re:
          alertname: ^(DatabaseDown|DatabaseSlowQueries|DatabaseHighConnections)$
        receiver: 'slack-database-alerts'
        group_wait: 30s
        repeat_interval: 1h
      
      # Application alerts
      - match_re:
          alertname: ^(HighErrorRate|HighLatency|HighMemoryUsage|HighCPUUsage)$
        receiver: 'slack-app-alerts'
        group_wait: 1m
        repeat_interval: 2h
  
  # Inhibition rules (suppress alerts based on other alerts)
  inhibit_rules:
    # Suppress warning if critical alert is firing
    - source_match:
        severity: critical
      target_match:
        severity: warning
      equal: ['alertname', 'namespace', 'pod']
    
    # Suppress pod alerts if node is down
    - source_match:
        alertname: NodeDown
      target_match_re:
        alertname: ^(PodCrashLooping|PodNotReady)$
      equal: ['node']
  
  # Receivers (notification destinations)
  receivers:
    # Default receiver - general observability alerts
    - name: 'slack-observability-alerts'
      slack_configs:
        - channel: '#observability-alerts'
          title: '🔔 Alert: {{ .GroupLabels.alertname }}'
          text: |
            *Severity:* {{ .CommonLabels.severity }}
            *Namespace:* {{ .CommonLabels.namespace }}
            *Summary:* {{ .CommonAnnotations.summary }}
            *Description:* {{ .CommonAnnotations.description }}
            
            *Affected Resources:*
            {{ range .Alerts }}
            • {{ .Labels.pod | default .Labels.service | default "N/A" }}
            {{ end }}
          send_resolved: true
          color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
    
    # Critical alerts - requires immediate attention
    - name: 'slack-critical-alerts'
      slack_configs:
        - channel: '#observability-critical'
          title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
          text: |
            *Severity:* CRITICAL
            *Namespace:* {{ .CommonLabels.namespace }}
            *Summary:* {{ .CommonAnnotations.summary }}
            *Description:* {{ .CommonAnnotations.description }}
            
            *Immediate Action Required*
            
            *Affected Resources:*
            {{ range .Alerts }}
            • {{ .Labels.pod | default .Labels.service | default "N/A" }}
            {{ end }}
            
            *Resolution Steps:*
            {{ .CommonAnnotations.resolution_steps | default "Check runbook for details" }}
          send_resolved: true
          color: 'danger'
    
    # High severity alerts
    - name: 'slack-high-alerts'
      slack_configs:
        - channel: '#observability-alerts'
          title: '⚠️ HIGH: {{ .GroupLabels.alertname }}'
          text: |
            *Severity:* HIGH
            *Namespace:* {{ .CommonLabels.namespace }}
            *Summary:* {{ .CommonAnnotations.summary }}
            *Description:* {{ .CommonAnnotations.description }}
            
            *Affected Resources:*
            {{ range .Alerts }}
            • {{ .Labels.pod | default .Labels.service | default "N/A" }}
            {{ end }}
          send_resolved: true
          color: 'warning'
    
    # Pod-specific alerts
    - name: 'slack-pod-alerts'
      slack_configs:
        - channel: '#observability-pods'
          title: '🔄 Pod Alert: {{ .GroupLabels.alertname }}'
          text: |
            *Alert:* {{ .GroupLabels.alertname }}
            *Namespace:* {{ .CommonLabels.namespace }}
            *Summary:* {{ .CommonAnnotations.summary }}
            
            *Affected Pods:*
            {{ range .Alerts }}
            • {{ .Labels.pod }} ({{ .Labels.container | default "N/A" }})
            {{ end }}
            
            *Suggested Actions:*
            • Check pod logs: `oc logs {{ (index .Alerts 0).Labels.pod }} -n nilabja-haldar-dev`
            • Check pod events: `oc describe pod {{ (index .Alerts 0).Labels.pod }} -n nilabja-haldar-dev`
          send_resolved: true
          color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'
    
    # Database alerts
    - name: 'slack-database-alerts'
      slack_configs:
        - channel: '#observability-database'
          title: '💾 Database Alert: {{ .GroupLabels.alertname }}'
          text: |
            *Alert:* {{ .GroupLabels.alertname }}
            *Namespace:* {{ .CommonLabels.namespace }}
            *Summary:* {{ .CommonAnnotations.summary }}
            *Description:* {{ .CommonAnnotations.description }}
            
            *Database:* {{ .CommonLabels.service | default "postgresql" }}
            
            *Suggested Actions:*
            • Check database logs
            • Review connection pool settings
            • Monitor query performance
          send_resolved: true
          color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
    
    # Application alerts
    - name: 'slack-app-alerts'
      slack_configs:
        - channel: '#observability-apps'
          title: '📱 Application Alert: {{ .GroupLabels.alertname }}'
          text: |
            *Alert:* {{ .GroupLabels.alertname }}
            *Namespace:* {{ .CommonLabels.namespace }}
            *Application:* {{ .CommonLabels.app | default "N/A" }}
            *Summary:* {{ .CommonAnnotations.summary }}
            
            *Metrics:*
            {{ range .Alerts }}
            • {{ .Labels.pod }}: {{ .Annotations.value | default "N/A" }}
            {{ end }}
            
            *Suggested Actions:*
            {{ .CommonAnnotations.resolution_steps | default "Check application logs and metrics" }}
          send_resolved: true
          color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'

# Slack webhook secret (to be created separately)
slackWebhook:
  # Secret name containing Slack webhook URL
  secretName: alertmanager-slack-webhook
  # Key in secret containing webhook URL
  secretKey: webhook-url

# Resource limits
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /-/healthy
    port: 9093
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /-/ready
    port: 9093
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5

# ServiceMonitor for Prometheus metrics scraping
serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  labels:
    prometheus: kube-prometheus

# Security context
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Pod security context
podSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

# High availability settings
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - alertmanager
          topologyKey: kubernetes.io/hostname

# Node selector (optional)
nodeSelector: {}

# Tolerations (optional)
tolerations: []

# Additional labels
labels:
  app: alertmanager
  component: observability
  managed-by: helm

# Additional annotations
annotations:
  description: "Alertmanager for alert routing and Slack notifications"
  namespace: "nilabja-haldar-dev"

# Alertmanager web configuration
webConfig:
  # External URL for Alertmanager (for links in notifications)
  externalUrl: ""
  # Route prefix
  routePrefix: /

# Cluster configuration for HA
cluster:
  enabled: true
  # Peer addresses (will be auto-discovered via headless service)
  peers: []
  # Listen address for cluster communication
  listenAddress: "0.0.0.0:9094"
  # Gossip interval
  gossipInterval: 200ms
  # Push/pull interval
  pushPullInterval: 60s

